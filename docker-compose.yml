services:
  backend:
    build: .
    container_name: backend_tahfidz_kalimasada
    restart: always
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "${PORT}:5005"

  db:
    image: postgres:16
    container_name: db_tahfidz_kalimasada
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
